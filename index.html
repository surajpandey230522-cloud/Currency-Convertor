<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Convertor</title>
    <link rel="stylesheet" href="styl.css">
    <link <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />>
</head>
<body>
    <div class="container">
        <h3>CURRENCY CONVERTOR</h3>
        <form>
            <div class="amount">
                <p>Enter Amount</p>
                <input value="100" type="text">
            </div>
        
   
    <div class="dropdown">
        <div class="from">
            <p>From</p>
           <div class="select-container">
               <img src="https://flagsapi.com/US/flat/64.png">
               <select name="from">
                    
                <!-- <option value="USD">USD</option>
                <option value="INR">INR</option>
                <option value="EUR">EUR</option>
                <option value="AUD">AUD</option>
             -->
               </select>
           </div>
        </div>
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        <div class="To"><p>To</p>
           <div class="select-container">
               <img src="https://flagsapi.com/IN/flat/64.png">
               <select name="To">
                    
                <!-- <option value="USD">USD</option>
                <option value="INR">INR</option>
                <option value="EUR">EUR</option>
                <option value="AUD">AUD</option> -->
            
               </select>
            </div>
        </div>
    </div>
    
         <div class="msg">1USD = 96INR</div>
          <button>Get Exchange rate</button>
     </form>
    </div>
    <script src="scripts.js"></script>
   
</body>
 <!-- <script src="codes.js"></script> -->
</html>
